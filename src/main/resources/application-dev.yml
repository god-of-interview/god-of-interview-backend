spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}/${MYSQL_DBNAME}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update  # 개발에서는 자동 테이블 생성
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# 개발용 포트
server:
  port: 8080

logging:
  level:
    com.capstone.godofinterview: DEBUG

# S3
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${S3_BUCKET_NAME}

# JWT 토큰
jwt:
  secret: ${JWT_SECRET_KEY}