# workflow 이름
name: god-of-interview-CI/CD

# Event : 실행되는 시점을 설정
# main 이라는 브랜치에 push 될 때 아래 workflow를 실행
on:
  push:
    branches:
      - dev

# 하나의 workflow는 1개 이상의 job으로 구성된다.
# 여러 job은 기본적으로 병렬적으로 수행된다.
jobs:
  # job을 식별하기 위한 id
  My-Deploy-Job:
    # ubuntu 환경 / 가장 최신 버전(latest)
    runs-on: ubuntu-latest
    # Step : 특정 작업을 수행하는 가장 작은 단위
    # Job은 여러 Step들로 구성되어 있다.
    steps:
      # (1) 코드 체크아웃
      - name: Check out repository
        uses: actions/checkout@v4

      # (2) JDK 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # (3) Gradle 빌드
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      # (4) Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # (5) Docker 이미지 빌드 & 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/god-of-interview:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/god-of-interview:${{ github.sha }}

      # (6) docker-compose.yml 파일 전송
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/ubuntu/spring-app"

      # (7) 배포 실행
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/spring-app
            
            # .env.prod 파일 생성
            cat > .env.prod << EOF
            MYSQL_HOST=${{ secrets.MYSQL_HOST }}
            MYSQL_DBNAME=${{ secrets.MYSQL_DBNAME }}
            MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            EOF
            
            # Docker 설치 확인
            if ! command -v docker &> /dev/null; then
              echo "🐳 Docker 설치 중..."
              sudo apt update
              sudo apt install -y docker.io docker-compose-plugin
              sudo systemctl start docker
              sudo usermod -a -G docker ubuntu
              newgrp docker
            fi
            
            # 기존 컨테이너 중지
            docker-compose -f docker-compose.prod.yml down || true
            
            # 새 이미지 다운로드
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/god-of-interview:latest
            
            # 사용하지 않는 이미지 정리
            docker image prune -f
            
            # 새 컨테이너 실행
            docker-compose -f docker-compose.prod.yml up -d
